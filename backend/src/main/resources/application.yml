spring:
  application:
    name: vob-workbench

app:
  mongodb:
    connection-string: ${MONGODB_CONNECTION_STRING:mongodb://localhost:27017}
    database: ${MONGODB_DATABASE:vob_workbench}

server:
  port: 8080

springdoc:
  swagger-ui:
    url: /openapi.yaml
    path: /swagger-ui.html

security:
  jwt:
    secret: ${JWT_SECRET:change-this-dev-secret-must-be-at-least-32-bytes-long}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-token:
    expiration-ms: ${REFRESH_TOKEN_EXPIRATION_MS:604800000}
