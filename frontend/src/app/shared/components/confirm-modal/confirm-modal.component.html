<app-modal [open]="open" [title]="title" (closed)="cancelled.emit()">
  <div class="modal-body">
    <p>{{ message }}</p>
    <div class="form-actions">
      <button type="button" class="button ghost" (click)="cancelled.emit()">Cancel</button>
      <button type="button" class="button danger" (click)="confirmed.emit()">{{ confirmLabel }}</button>
    </div>
  </div>
</app-modal>
